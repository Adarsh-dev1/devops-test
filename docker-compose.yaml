services:
  app:
#Uncomment the build context line when testing
#    build: .
    image: devops-test-image
    container_name: devops-test
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    restart: unless-stopped